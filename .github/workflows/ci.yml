name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Format check
        run: ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: mypy strict
        run: mypy src/ --config-file pyproject.toml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: >
          pytest tests/ -v --tb=short
          --cov=src/cuepoint
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=75
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Check for known vulnerabilities
        run: python -m pip_audit
      - name: Check for secrets in code
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --exclude-files '\.git/.*' --exclude-files 'venv/.*' --exclude-files 'tests/.*' > .secrets-baseline.json
          python -c "
          import json, sys
          with open('.secrets-baseline.json') as f:
              data = json.load(f)
          results = data.get('results', {})
          total = sum(len(v) for v in results.values())
          if total > 0:
              for path, secrets in results.items():
                  for s in secrets:
                      print(f'  {path}:{s.get(\"line_number\", \"?\")}: {s.get(\"type\", \"unknown\")}')
              print(f'Found {total} potential secret(s)')
              sys.exit(1)
          print('No secrets detected')
          "
